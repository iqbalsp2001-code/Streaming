    <style>
        /* --- KELOLA GAYA UTAMA WEB --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: #0f172a; color: #f8fafc; padding-bottom: 50px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* --- HALAMAN BERANDA: PROFIL --- */
        .profile-header { text-align: center; padding: 40px 0 20px 0; }
        .profile-header img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; margin-bottom: 15px; }
        .profile-header h1 { font-size: 24px; font-weight: 700; color: #ffffff; }
        .profile-header p { font-size: 14px; color: #94a3b8; margin-top: 5px; }

        /* --- DAFTAR VIDEO --- */
        .video-section-title { font-size: 18px; margin: 25px 0 15px 0; color: #3b82f6; border-left: 4px solid #3b82f6; padding-left: 10px; }
        .video-list { display: flex; flex-direction: column; gap: 15px; }
        .video-item { display: flex; background-color: #1e293b; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: transform 0.2s, background-color 0.2s; border: 1px solid #334155; }
        .video-item:hover { transform: translateY(-2px); background-color: #334155; }
        .video-thumbnail-wrapper { position: relative; width: 180px; min-width: 180px; aspect-ratio: 16 / 9; background-color: #000; }
        .video-thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px 15px; display: flex; flex-direction: column; justify-content: center; }
        .video-title { font-size: 16px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- NAVIGASI HALAMAN (PAGINATION) --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 30px; margin-bottom: 20px; flex-wrap: wrap; }
        .page-btn { padding: 10px 16px; background-color: #1e293b; color: #f8fafc; border: 1px solid #334155; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .page-btn.active { background-color: #3b82f6; border-color: #3b82f6; color: #fff; }
        .page-btn:hover:not(:disabled) { background-color: #334155; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- BATASAN IKLAN INPAGE AGAR TIDAK MENUTUPI PAGINATION --- */
        .inpage-ad-container { width: 100%; max-height: 120px; overflow: hidden; display: flex; justify-content: center; margin-top: 15px; }

        /* --- HALAMAN NONTON --- */
        #watch-view { display: none; padding-top: 20px; }
        .back-btn { display: inline-flex; align-items: center; color: #3b82f6; text-decoration: none; font-size: 14px; margin-bottom: 20px; font-weight: 600; }
        .back-btn:hover { text-decoration: underline; }
        
        .player-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background-color: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 2px solid #334155; }
        .watch-video-title { font-size: 20px; font-weight: 700; margin: 15px 0 5px 0; line-height: 1.4; }

        /* --- OVERLAY GLOBAL FULL SCREEN (KEMBALI SEPERTI SEMULA) --- */
        .global-ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(5px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px; text-align: center; }
        
        .ad-close-btn { position: absolute; top: 20px; right: 20px; background-color: #3b82f6; color: #fff; border: none; padding: 10px 20px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: background 0.2s; z-index: 10000; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .ad-close-btn:disabled { background-color: #334155; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .ad-close-btn:hover:not(:disabled) { background-color: #2563eb; }

        .overlay-visual-cue { margin-bottom: 20px; color: #60a5fa; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; animation: pulseText 1.5s infinite; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 25px; border: 1px solid #3b82f6; }
        @keyframes pulseText { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

        .ad-box { width: 100%; max-width: 400px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: transparent; overflow: hidden; }

        /* --- TOMBOL SMARTLINK & DOWNLOAD --- */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin: 20px 0 30px 0; }
        .smartlink-btn { display: block; width: 100%; text-align: center; text-decoration: none; padding: 16px 20px; font-size: 16px; font-weight: 700; border-radius: 8px; transition: all 0.3s ease; color: #ffffff !important; }
        .btn-download { background: linear-gradient(90deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.7); background: linear-gradient(90deg, #34d399 0%, #10b981 100%); }
        .btn-viral { background: linear-gradient(90deg, #e50914 0%, #b20710 100%); box-shadow: 0 4px 15px rgba(229, 09, 20, 0.4); }
        .btn-viral:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(229, 09, 20, 0.7); background: linear-gradient(90deg, #ff1723 0%, #d80b15 100%); }

        @media (max-width: 480px) {
            .video-item { flex-direction: column; }
            .video-thumbnail-wrapper { width: 100%; min-width: 100%; }
            .video-info { padding: 10px; }
            .video-title { font-size: 14px; }
            .smartlink-btn { padding: 14px 15px; font-size: 14px; }
            .page-btn { padding: 8px 12px; font-size: 12px; }
            .overlay-visual-cue { font-size: 14px; }
        }
    </style>
</head>

    <div class="container">

    <script>
        const namaKoleksi = "Koleksi Video Saya";
        const deskripsiKoleksi = "Streaming lancar koleksi pilihan (Support DoodStream)";

        const videoData = [
            { id: "vid-01", title: "Video Koleksi 1", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152324_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/q9g480u3uqcd", shortlink: "https://ouo.io/KQrcW7v" },
            { id: "vid-02", title: "Video Koleksi 2", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152349_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/rbhsiqsfq5lm", shortlink: "https://ouo.io/AzIUr5X" },
            { id: "vid-03", title: "Video Koleksi 3", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152242_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/ls1qr4uy97la", shortlink: "https://ouo.io/MZfkum" },
            { id: "vid-04", title: "Video Koleksi 4", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/HeyLink_me%20_%20%F0%9F%91%87Asupanmu%F0%9F%91%87%20(1)-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/5oavf2u07vy5", shortlink: "https://ouo.io/yms9o5" },
            { id: "vid-05", title: "Video Koleksi 5", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152541_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/r9hzqmyl61qc", shortlink: "https://ouo.io/xxqhP3" },
            { id: "vid-06", title: "Video Koleksi 6", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152458_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/j05jimi3cskd", shortlink: "https://ouo.io/3bLHop9" },
            { id: "vid-07", title: "Video Koleksi 7", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152438_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/29y9vxo4botg", shortlink: "https://ouo.io/aH4RrPA" },
            { id: "vid-08", title: "Video Koleksi 8", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152416_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/x0wp2oasr8tw", shortlink: "https://ouo.io/05qxuI" },
            { id: "vid-09", title: "Video Koleksi 9", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_15236_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/6tconlqcgfha", shortlink: "https://ouo.io/ZlF6vt" },
            { id: "vid-10", title: "Video Koleksi 10", thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152216_link.me-picsay.jpeg", doodstreamUrl: "https://playmogo.com/e/jy6pe7aydu0j", shortlink: "https://ouo.io/j37NmF" }
        ];

        document.getElementById('collection-name').innerText = namaKoleksi;
        document.getElementById('collection-desc').innerText = deskripsiKoleksi;

        let currentPage = 1;
        const videosPerPage = 5;

        // FUNGSI OVERLAY GLOBAL
        function startGlobalAdTimer() {
            const overlay = document.getElementById('global-video-overlay');
            const closeBtn = document.getElementById('close-ad-btn');
            
            if(window.adInterval) clearInterval(window.adInterval);
            
            overlay.style.display = 'flex';
            closeBtn.disabled = true;
            
            let timeLeft = 8;
            closeBtn.innerText = `Tunggu (${timeLeft}s)`;

            window.adInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    closeBtn.innerText = `Tunggu (${timeLeft}s)`;
                } else {
                    clearInterval(window.adInterval);
                    closeBtn.innerText = "Tutup Iklan [X]";
                    closeBtn.disabled = false;
                }
            }, 1000);

            closeBtn.onclick = () => {
                overlay.style.display = 'none'; 
            };
        }

        function renderVideos(containerElement, scrollToTopId) {
            containerElement.innerHTML = '';
            
            const totalPages = Math.ceil(videoData.length / videosPerPage);
            const startIndex = (currentPage - 1) * videosPerPage;
            const endIndex = startIndex + videosPerPage;
            const paginatedVideos = videoData.slice(startIndex, endIndex);

            paginatedVideos.forEach((video) => {
                const videoLink = document.createElement('a');
                videoLink.href = video.shortlink; 
                videoLink.target = "_self"; 
                videoLink.className = 'video-item';
                videoLink.innerHTML = `
                    <div class="video-thumbnail-wrapper">
                        <img class="video-thumbnail" src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                    </div>
                `;
                containerElement.appendChild(videoLink);

                // NATIVE BANNER ADSTERRA (Diantara Video)
                const adWrapper = document.createElement('div');
                adWrapper.style.margin = "15px 0"; adWrapper.style.width = "100%";
                const adIframe = document.createElement('iframe');
                adIframe.style.width = "100%"; adIframe.style.height = "180px"; 
                adIframe.style.border = "none"; adIframe.style.overflow = "hidden"; adIframe.scrolling = "no";
                adIframe.srcdoc = `
                    <!DOCTYPE html>
                    <html>
                    <head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;background:transparent;}</style></head>
                    <body>
                        <script async="async" data-cfasync="false" src="https://pl29712215.effectivecpmnetwork.com/35a0dde7ed66473727dc3191f8350241/invoke.js"><\/script>
                        <div id="container-35a0dde7ed66473727dc3191f8350241"></div>
                    </body>
                    </html>
                `;
                adWrapper.appendChild(adIframe);
                containerElement.appendChild(adWrapper);
            });

            if (totalPages > 1) {
                const paginationDiv = document.createElement('div');
                paginationDiv.className = 'pagination';

                const prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn'; prevBtn.innerHTML = '&#8592; Back'; prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderVideos(containerElement, scrollToTopId); document.getElementById(scrollToTopId).scrollIntoView(); startGlobalAdTimer(); } };
                paginationDiv.appendChild(prevBtn);

                for (let i = 1; i <= totalPages; i++) {
                    const pageNumBtn = document.createElement('button');
                    pageNumBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                    pageNumBtn.innerText = i;
                    pageNumBtn.onclick = () => { currentPage = i; renderVideos(containerElement, scrollToTopId); document.getElementById(scrollToTopId).scrollIntoView(); startGlobalAdTimer(); };
                    paginationDiv.appendChild(pageNumBtn);
                }

                const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn'; nextBtn.innerHTML = 'Next &#8594;'; nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderVideos(containerElement, scrollToTopId); document.getElementById(scrollToTopId).scrollIntoView(); startGlobalAdTimer(); } };
                paginationDiv.appendChild(nextBtn);
                containerElement.appendChild(paginationDiv);
            }
        }

        function handleRouting() {
            const hash = window.location.hash;
            const homeView = document.getElementById('home-view');
            const watchView = document.getElementById('watch-view');
            const playerWrapper = document.getElementById('player-wrapper');
            const watchTitle = document.getElementById('watch-title');

            if (hash.startsWith('#watch')) {
                homeView.style.display = 'none';
                watchView.style.display = 'block';

                const urlParams = new URLSearchParams(hash.split('?')[1]);
                const videoId = urlParams.get('v');
                const currentVideo = videoData.find(v => v.id === videoId);

                if (currentVideo) {
                    watchTitle.innerText = currentVideo.title;
                    document.title = currentVideo.title + " - " + namaKoleksi;

                    playerWrapper.innerHTML = `
                        <iframe src="${currentVideo.doodstreamUrl}" scrolling="no" frameborder="0" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                    `;
                }
                
                document.getElementById('download-button-space').innerHTML = `
                    <div class="btn-group">
                        <a href="https://shrinkme.click/359VOQa" target="_blank" rel="noopener noreferrer" class="smartlink-btn btn-download">
                            📥 Download &amp; Watch More Full Video
                        </a>
                        <a href="https://www.effectivecpmnetwork.com/wy64g3i3?key=f0addc8ab90e46cd72431b8b2723714a" target="_blank" rel="noopener noreferrer" class="smartlink-btn btn-viral">
                            🔥 Tonton Video Viral Lainnya
                        </a>
                    </div>
                `;

                currentPage = 1;
                renderVideos(document.getElementById('video-list-watch'), 'watch-more-title');
                window.scrollTo(0, 0);
            } else {
                homeView.style.display = 'block';
                watchView.style.display = 'none';
                playerWrapper.innerHTML = '';
                document.title = namaKoleksi;
                
                currentPage = 1;
                renderVideos(document.getElementById('video-list-home'), 'top-section');
                window.scrollTo(0, 0);
            }

            // Panggil iklan overlay global setiap kali routing (buka awal, ke halaman nonton, dll)
            startGlobalAdTimer();
        }

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('DOMContentLoaded', handleRouting);
    </script>

    <!-- SISTEM PEMBATAS POPUNDER (2 KALI PER 1 JAM) -->
    <script>
        (function() {
            const popunderLimitHours = 1; 
            const maxPopunders = 2; 
            
            let popData = JSON.parse(localStorage.getItem('popunderData')) || { count: 0, firstSeen: new Date().getTime() };
            const currentTime = new Date().getTime();

            if (currentTime - popData.firstSeen > (popunderLimitHours * 60 * 60 * 1000)) {
                popData = { count: 0, firstSeen: currentTime };
            }

            if (popData.count < maxPopunders) {
                const script = document.createElement('script');
                script.src = "https://pl29712342.effectivecpmnetwork.com/db/2e/c2/db2ec21e35032100a9c3eee470fd7c7f.js";
                document.body.appendChild(script);
                
                popData.count++;
                localStorage.setItem('popunderData', JSON.stringify(popData));
            }
        })();
    </script>
