<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Video</title>

    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css" />
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        /* --- KELOLA GAYA UTAMA WEB (CSS) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* Warna latar belakang gelap */
            color: #f8fafc;
            padding-bottom: 50px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- HALAMAN BERANDA: PROFIL --- */
        .profile-header {
            text-align: center;
            padding: 40px 0 20px 0;
        }

        .profile-header img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3b82f6;
            margin-bottom: 15px;
        }

        .profile-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }

        .profile-header p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* --- DAFTAR VIDEO (LIST MENURUN) --- */
        .video-section-title {
            font-size: 18px;
            margin: 25px 0 15px 0;
            color: #3b82f6;
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-item {
            display: flex;
            background-color: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid #334155;
        }

        .video-item:hover {
            transform: translateY(-2px);
            background-color: #334155;
        }

        .video-thumbnail-wrapper {
            position: relative;
            width: 180px;
            min-width: 180px;
            aspect-ratio: 16 / 9;
            background-color: #000;
        }

        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- HALAMAN NONTON (WATCH VIEW) --- */
        #watch-view {
            display: none;
            padding-top: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .player-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Disesuaikan untuk Fluid Player agar mengisi kontainer */
        .fluid_video_wrapper {
            width: 100% !important;
            height: 100% !important;
        }

        .watch-video-title {
            font-size: 20px;
            font-weight: 700;
            margin: 15px 0 5px 0;
            line-height: 1.4;
        }

        /* --- STYLING UNTUK TOMBOL SMARTLINK DOWNLOAD --- */
        .smartlink-btn {
            display: block;
            width: 100%;
            max-width: 100%;
            margin: 15px auto 25px auto;
            background: linear-gradient(90deg, #e50914 0%, #b20710 100%);
            color: #ffffff !important;
            text-align: center;
            text-decoration: none;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(229, 09, 20, 0.4);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .smartlink-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(229, 09, 20, 0.7);
            background: linear-gradient(90deg, #ff1723 0%, #d80b15 100%);
        }

        /* Responsive untuk HP Layar Kecil */
        @media (max-width: 480px) {
            .video-item {
                flex-direction: column;
            }
            .video-thumbnail-wrapper {
                width: 100%;
                min-width: 100%;
            }
            .video-info {
                padding: 10px;
            }
            .video-title {
                font-size: 14px;
            }
            .smartlink-btn {
                padding: 14px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="home-view">
            <div class="profile-header">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Wa-spam/refs/heads/main/pornhub-top.jpg" alt="Foto Profil">
                <h1 id="collection-name">Nama Koleksi Video</h1>
                <p id="collection-desc">Kumpulan video pilihan terbaik</p>
            </div>

            <h2 class="video-section-title">Daftar Video Terbaru</h2>
            <div id="video-list-home" class="video-list"></div>
        </div>

        <div id="watch-view">
            <a href="#home" class="back-btn">← Kembali ke Beranda</a>
            
            <div class="player-container" id="player-wrapper">
                </div>

            <h1 id="watch-title" class="watch-video-title">Judul Video</h1>

            <div id="download-button-space"></div>

            <h2 class="video-section-title">Video Lainnya</h2>
            <div id="video-list-watch" class="video-list"></div>
        </div>

    </div>

    <script>
        // 1. KELOLA INFORMASI BLOG ANDA DISINI
        const namaKoleksi = "Koleksi Video Saya";
        const deskripsiKoleksi = "Streaming lancar koleksi pilihan (Support VAST Ads)";

        // 2. KELOLA DATA VIDEO DI SINI
        // Catatan: Ganti videoUrl dengan direct link mp4 Anda (Bukan link preview Google Drive agar Iklan VAST bisa muncul)
        const videoData = [
            {
                id: "vid-01",
                title: "Video Koleksi 1",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152324_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv" // GANTI DENGAN DIRECT LINK VIDEO ANDA
            },
            {
                id: "vid-02",
                title: "Video Koleksi 2",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152349_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-03",
                title: "Video Koleksi 3",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152242_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-04",
                title: "Video Koleksi 4",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/HeyLink_me%20_%20%F0%9F%91%87Asupanmu%F0%9F%91%87%20(1)-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-05",
                title: "Video Koleksi 5",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152541_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-06",
                title: "Video Koleksi 6",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152458_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-07",
                title: "Video Koleksi 7",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152438_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-08",
                title: "Video Koleksi 8",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152416_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-09",
                title: "Video Koleksi 9",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_15236_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            },
            {
                id: "vid-10",
                title: "Video Koleksi 10",
                thumbnail: "https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152216_link.me-picsay.jpeg",
                videoUrl: "https://cdn.fluidplayer.com/videos/valerian-1080p.mkv"
            }
        ];

        // Inisialisasi Judul Utama Beranda
        document.getElementById('collection-name').innerText = namaKoleksi;
        document.getElementById('collection-desc').innerText = deskripsiKoleksi;

        // Fungsi Render List Video ke Element
        function renderVideos(containerElement) {
            containerElement.innerHTML = '';
            videoData.forEach(video => {
                const videoLink = document.createElement('a');
                videoLink.href = `#watch?v=${video.id}`;
                videoLink.className = 'video-item';
                videoLink.innerHTML = `
                    <div class="video-thumbnail-wrapper">
                        <img class="video-thumbnail" src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                    </div>
                `;
                containerElement.appendChild(videoLink);
            });
        }

        // Fungsi Inti Routing Halaman (Beranda vs Nonton)
        function handleRouting() {
            const hash = window.location.hash;
            const homeView = document.getElementById('home-view');
            const watchView = document.getElementById('watch-view');
            const playerWrapper = document.getElementById('player-wrapper');
            const watchTitle = document.getElementById('watch-title');

            if (hash.startsWith('#watch')) {
                homeView.style.display = 'none';
                watchView.style.display = 'block';

                const urlParams = new URLSearchParams(hash.split('?')[1]);
                const videoId = urlParams.get('v');
                const currentVideo = videoData.find(v => v.id === videoId);

                if (currentVideo) {
                    watchTitle.innerText = currentVideo.title;
                    document.title = currentVideo.title + " - " + namaKoleksi;

                    // Buat ulang elemen video setiap ganti halaman agar script Iklan VAST ke-reset dengan baik
                    playerWrapper.innerHTML = `
                        <video id="main-player" controls style="width: 100%; height: 100%;">
                            <source src="${currentVideo.videoUrl}" type="video/mp4" />
                        </video>
                    `;

                    // Inisialisasi Fluid Player & Pasang Tag Iklan VAST
                    fluidPlayer('main-player', {
                        layoutControls: {
                            fillToContainer: true,
                            posterImage: currentVideo.thumbnail // Menjadikan thumbnail sebagai cover video
                        },
                        vastOptions: {
                            adList: [
                                {
                                    roll: 'preRoll', // Iklan VAST diputar sebelum video
                                    vastTag: 'https://vast.yomeno.xyz/vast?spot_id=1492212'
                                }
                            ]
                        }
                    });
                }
                
                // === PROSES MEMASUKKAN ULANG TOMBOL SMARTLINK ===
                const btnSpace = document.getElementById('download-button-space');
                btnSpace.innerHTML = `
                    <a href="https://www.effectivecpmnetwork.com/gwysdn6eqr?key=0341749c045688bb0aebdd64d2953b20" target="_blank" rel="noopener noreferrer" class="smartlink-btn">
                        📥 Download &amp; Watch More Full Video Collections
                    </a>
                `;

                // Render daftar rekomendasi video lainnya di bawah player
                renderVideos(document.getElementById('video-list-watch'));
            } else {
                homeView.style.display = 'block';
                watchView.style.display = 'none';
                playerWrapper.innerHTML = ''; // Hapus video saat kembali ke beranda agar suara berhenti
                document.title = namaKoleksi;
                renderVideos(document.getElementById('video-list-home'));
            }
            window.scrollTo(0, 0);
        }

        // Event Listener untuk memicu perpindahan halaman
        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('DOMContentLoaded', handleRouting);
    </script>
</body>
</html>
