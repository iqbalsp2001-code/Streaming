<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    
    <!-- Fluid Player CSS untuk Video & Iklan VAST -->
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css" />
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #f1f1f1;
            --card-bg: #202020;
            --primary: #ffa31a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* Header / Profil */
        header {
            display: flex;
            align-items: center;
            padding: 20px;
            background-color: #000;
            border-bottom: 1px solid #333;
        }

        .profile-pic {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            margin-right: 15px;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        /* Container Utama */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Video Player Section */
        .video-section {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 40px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Galeri Thumbnail */
        .gallery-title {
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .thumbnail-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .thumbnail-card:hover {
            transform: scale(1.02);
            background-color: #333;
        }

        .thumbnail-card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }

        .thumbnail-info {
            padding: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Header dengan Foto Profil -->
    <header>
        <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Wa-spam/refs/heads/main/pornhub-top.jpg" alt="Profile" class="profile-pic">
        <h1>My Channel</h1>
    </header>

    <div class="container">
        <!-- Main Video Player dengan VAST -->
        <div class="video-section">
            <video id="my-video" controls style="width: 100%; height: 100%;">
                <!-- Video Dummy sebagai placeholder (Wajib ada agar pemutar video berjalan dan menampilkan iklan) -->
                <source src="https://cdn.fluidplayer.com/videos/valerian-1080p.mkv" type="video/mp4" />
            </video>
        </div>

        <!-- Galeri 10 Thumbnail -->
        <h2 class="gallery-title">Daftar Video</h2>
        <div class="thumbnail-grid">
            
            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152324_link.me-picsay.jpeg" alt="Thumb 1">
                <div class="thumbnail-info">Video 1</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152349_link.me-picsay.jpeg" alt="Thumb 2">
                <div class="thumbnail-info">Video 2</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152242_link.me-picsay.jpeg" alt="Thumb 3">
                <div class="thumbnail-info">Video 3</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/HeyLink_me%20_%20%F0%9F%91%87Asupanmu%F0%9F%91%87%20(1)-picsay.jpeg" alt="Thumb 4">
                <div class="thumbnail-info">Video 4</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152541_link.me-picsay.jpeg" alt="Thumb 5">
                <div class="thumbnail-info">Video 5</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152458_link.me-picsay.jpeg" alt="Thumb 6">
                <div class="thumbnail-info">Video 6</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152438_link.me-picsay.jpeg" alt="Thumb 7">
                <div class="thumbnail-info">Video 7</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152416_link.me-picsay.jpeg" alt="Thumb 8">
                <div class="thumbnail-info">Video 8</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_15236_link.me-picsay.jpeg" alt="Thumb 9">
                <div class="thumbnail-info">Video 9</div>
            </div>

            <div class="thumbnail-card">
                <img src="https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152216_link.me-picsay.jpeg" alt="Thumb 10">
                <div class="thumbnail-info">Video 10</div>
            </div>

        </div>
    </div>

    <!-- Script inisialisasi Video Player dan Konfigurasi Iklan VAST -->
    <script>
        var myPlayer = fluidPlayer(
            'my-video',
            {
                layoutControls: {
                    fillToContainer: true,
                    posterImage: 'https://raw.githubusercontent.com/iqbalsp2001-code/Toktik-img/refs/heads/main/Screenshot_24-5-2026_152324_link.me-picsay.jpeg', // Memakai thumbnail pertama sebagai poster video
                },
                vastOptions: {
                    adList: [
                        {
                            roll: 'preRoll', // Iklan dimainkan sebelum video utama dimulai
                            vastTag: 'https://vast.yomeno.xyz/vast?spot_id=1492212' // Link Iklan VAST Anda
                        }
                    ]
                }
            }
        );
    </script>

</body>
</html>
