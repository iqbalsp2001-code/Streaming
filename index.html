        /* --- KELOLA GAYA UTAMA WEB (CSS) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: #0f172a; color: #f8fafc; padding-bottom: 50px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* --- HALAMAN BERANDA: PROFIL --- */
        .profile-header { text-align: center; padding: 40px 0 20px 0; }
        .profile-header img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; margin-bottom: 15px; }
        .profile-header h1 { font-size: 24px; font-weight: 700; color: #ffffff; }
        .profile-header p { font-size: 14px; color: #94a3b8; margin-top: 5px; }

        /* --- DAFTAR VIDEO --- */
        .video-section-title { font-size: 18px; margin: 25px 0 15px 0; color: #3b82f6; border-left: 4px solid #3b82f6; padding-left: 10px; }
        .video-list { display: flex; flex-direction: column; gap: 15px; }
        .video-item { display: flex; background-color: #1e293b; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: transform 0.2s, background-color 0.2s; border: 1px solid #334155; }
        .video-item:hover { transform: translateY(-2px); background-color: #334155; }
        .video-thumbnail-wrapper { position: relative; width: 180px; min-width: 180px; aspect-ratio: 16 / 9; background-color: #000; }
        .video-thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px 15px; display: flex; flex-direction: column; justify-content: center; }
        .video-title { font-size: 16px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- NAVIGASI HALAMAN (PAGINATION) --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 30px; margin-bottom: 20px; flex-wrap: wrap; }
        .page-btn { padding: 10px 16px; background-color: #1e293b; color: #f8fafc; border: 1px solid #334155; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .page-btn.active { background-color: #3b82f6; border-color: #3b82f6; color: #fff; }
        .page-btn:hover:not(:disabled) { background-color: #334155; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- HALAMAN NONTON --- */
        #watch-view { display: none; padding-top: 20px; }
        .back-btn { display: inline-flex; align-items: center; color: #3b82f6; text-decoration: none; font-size: 14px; margin-bottom: 20px; font-weight: 600; }
        .back-btn:hover { text-decoration: underline; }
        
        /* Kontainer Video & Overlay */
        .player-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background-color: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .watch-video-title { font-size: 20px; font-weight: 700; margin: 15px 0 5px 0; line-height: 1.4; }

        /* STRUKTUR CSS OVERLAY IKLAN */
        .ad-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; text-align: center; }
        .ad-close-btn { position: absolute; top: 15px; right: 15px; background-color: #3b82f6; color: #fff; border: none; padding: 8px 16px; font-size: 13px; font-weight: 700; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .ad-close-btn:disabled { background-color: #334155; color: #94a3b8; cursor: not-allowed; }
        .ad-box { width: 100%; max-width: 400px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: transparent; overflow: hidden; }

        /* --- TOMBOL SMARTLINK & DOWNLOAD --- */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin: 20px 0 30px 0; }
        .smartlink-btn { display: block; width: 100%; text-align: center; text-decoration: none; padding: 16px 20px; font-size: 16px; font-weight: 700; border-radius: 8px; transition: all 0.3s ease; color: #ffffff !important; }
        .btn-download { background: linear-gradient(90deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.7); background: linear-gradient(90deg, #34d399 0%, #10b981 100%); }
        .btn-viral { background: linear-gradient(90deg, #e50914 0%, #b20710 100%); box-shadow: 0 4px 15px rgba(229, 09, 20, 0.4); }
        .btn-viral:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(229, 09, 20, 0.7); background: linear-gradient(90deg, #ff1723 0%, #d80b15 100%); }

        @media (max-width: 480px) {
            .video-item { flex-direction: column; }
            .video-thumbnail-wrapper { width: 100%; min-width: 100%; }
            .video-info { padding: 10px; }
            .video-title { font-size: 14px; }
            .smartlink-btn { padding: 14px 15px; font-size: 14px; }
            .page-btn { padding: 8px 12px; font-size: 12px; }
        }

        let currentPage = 1;
        const videosPerPage = 5;

        // FUNGSI UTK MENYALAKAN HITUNGAN MUNDUR TOMBOL CLOSE IKLAN (DURASI 30 DETIK)
        function startAdTimer() {
            const overlay = document.getElementById('video-ad-overlay');
            const closeBtn = document.getElementById('close-ad-btn');
            
            overlay.style.display = 'flex';
            closeBtn.disabled = true;
            
            let timeLeft = 30; // 30 Detik sesuai iklan overlay
            closeBtn.innerText = `Tunggu (${timeLeft}s)`;

            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    closeBtn.innerText = `Tunggu (${timeLeft}s)`;
                } else {
                    clearInterval(countdown);
                    closeBtn.innerText = "Tutup Iklan [X]";
                    closeBtn.disabled = false;
                }
            }, 1000);

            closeBtn.onclick = () => {
                overlay.style.display = 'none'; 
            };
        }

        function renderVideos(containerElement, scrollToTopId) {
            containerElement.innerHTML = '';
            
            const totalPages = Math.ceil(videoData.length / videosPerPage);
            const startIndex = (currentPage - 1) * videosPerPage;
            const endIndex = startIndex + videosPerPage;
            const paginatedVideos = videoData.slice(startIndex, endIndex);

            paginatedVideos.forEach((video) => {
                const videoLink = document.createElement('a');
                videoLink.href = video.shortlink; 
                videoLink.className = 'video-item';
                videoLink.innerHTML = `
                    <div class="video-thumbnail-wrapper">
                        <img class="video-thumbnail" src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                    </div>
                `;
                containerElement.appendChild(videoLink);

                // NATIVE BANNER ADSTERRA (Disisipkan lewat Iframe agar script ter-render)
                const adWrapper = document.createElement('div');
                adWrapper.style.margin = "15px 0"; adWrapper.style.width = "100%";
                const adIframe = document.createElement('iframe');
                adIframe.style.width = "100%"; adIframe.style.height = "180px"; 
                adIframe.style.border = "none"; adIframe.style.overflow = "hidden"; adIframe.scrolling = "no";
                adIframe.srcdoc = `
                    <!DOCTYPE html>
                    <html>
                    <head><style>body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;background:transparent;}</style></head>
                    <body>
                        <script async="async" data-cfasync="false" src="https://pl29712215.effectivecpmnetwork.com/35a0dde7ed66473727dc3191f8350241/invoke.js"><\/script>
                        <div id="container-35a0dde7ed66473727dc3191f8350241"></div>
                    </body>
                    </html>
                `;
                adWrapper.appendChild(adIframe);
                containerElement.appendChild(adWrapper);
            });

            if (totalPages > 1) {
                const paginationDiv = document.createElement('div');
                paginationDiv.className = 'pagination';

                const prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn'; prevBtn.innerHTML = '&#8592; Back'; prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderVideos(containerElement, scrollToTopId); document.getElementById(scrollToTopId).scrollIntoView(); } };
                paginationDiv.appendChild(prevBtn);

                for (let i = 1; i <= totalPages; i++) {
                    const pageNumBtn = document.createElement('button');
                    pageNumBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                    pageNumBtn.innerText = i;
                    pageNumBtn.onclick = () => { currentPage = i; renderVideos(containerElement, scrollToTopId); document.getElementById(scrollToTopId).scrollIntoView(); };
                    paginationDiv.appendChild(pageNumBtn);
                }

                const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn'; nextBtn.innerHTML = 'Next &#8594;'; nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderVideos(containerElement, scrollToTopId); document.getElementById(scrollToTopId).scrollIntoView(); } };
                paginationDiv.appendChild(nextBtn);
                containerElement.appendChild(paginationDiv);
            }
        }

        function handleRouting() {
            const hash = window.location.hash;
            const homeView = document.getElementById('home-view');
            const watchView = document.getElementById('watch-view');
            const playerWrapper = document.getElementById('player-wrapper');
            const watchTitle = document.getElementById('watch-title');

            if (hash.startsWith('#watch')) {
                homeView.style.display = 'none';
                watchView.style.display = 'block';

                const urlParams = new URLSearchParams(hash.split('?')[1]);
                const videoId = urlParams.get('v');
                const currentVideo = videoData.find(v => v.id === videoId);

                if (currentVideo) {
                    watchTitle.innerText = currentVideo.title;
                    document.title = currentVideo.title + " - " + namaKoleksi;

                    // LOAD PLAYER DOODSTREAM
                    playerWrapper.innerHTML = `
                        <iframe src="${currentVideo.doodstreamUrl}" scrolling="no" frameborder="0" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                    `;

                    // Jalankan Timer Overlay Iklan saat masuk halaman nonton
                    startAdTimer();
                }
                
                // TOMBOL DOWNLOAD & SMARTLINK
                document.getElementById('download-button-space').innerHTML = `
                    <div class="btn-group">
                        <a href="https://shrinkme.click/359VOQa" target="_blank" rel="noopener noreferrer" class="smartlink-btn btn-download">
                            📥 Download &amp; Watch More Full Video
                        </a>
                        <a href="https://www.effectivecpmnetwork.com/wy64g3i3?key=f0addc8ab90e46cd72431b8b2723714a" target="_blank" rel="noopener noreferrer" class="smartlink-btn btn-viral">
                            🔥 Tonton Video Viral Lainnya
                        </a>
                    </div>
                `;

                currentPage = 1;
                renderVideos(document.getElementById('video-list-watch'), 'watch-more-title');
                window.scrollTo(0, 0);
            } else {
                homeView.style.display = 'block';
                watchView.style.display = 'none';
                playerWrapper.innerHTML = '';
                document.title = namaKoleksi;
                
                currentPage = 1;
                renderVideos(document.getElementById('video-list-home'), 'top-section');
                window.scrollTo(0, 0);
            }
        }

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('DOMContentLoaded', handleRouting);
    </script>
